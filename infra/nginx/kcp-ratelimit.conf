# ──────────────────────────────────────────────────────────────────────────────
# /etc/nginx/conf.d/kcp-ratelimit.conf
#
# Rate limiting com WHITELIST para tráfego inter-peer e portal.
#
# Lógica:
#   - geo $is_internal: marca IPs confiáveis (VPS, localhost, Docker)
#   - map $rate_limit_key: se interno → key vazia ("") → não entra no bucket
#   - limit_req_zone usa $rate_limit_key → IPs internos ficam isentos
#
# IPs whitelisted (sem rate limit):
#   - 127.0.0.1     → portal nginx proxy_pass para peers
#   - 165.22.151.182 → sync entre peers (mesmo VPS)
#   - 10.0.0.0/8    → rede interna DigitalOcean
#   - 172.16.0.0/12 → rede Docker
#   - ::1           → localhost IPv6
# ──────────────────────────────────────────────────────────────────────────────

# Step 1: Identify internal/trusted IPs
geo $is_internal {
    default         0;
    127.0.0.1/32    1;  # localhost (portal proxy)
    ::1/128         1;  # localhost IPv6
    165.22.151.182  1;  # VPS public IP (inter-peer sync)
    10.0.0.0/8      1;  # DigitalOcean internal network
    172.16.0.0/12   1;  # Docker bridge networks
}

# Step 2: Map to rate limit key
# Internal IPs → empty key → no rate limiting (they share one empty bucket)
# External IPs → real IP → rate limited per IP
map $is_internal $rate_limit_key {
    1   "";
    0   $binary_remote_addr;
}

# ── Rate Limit Zones ────────────────────────────────────────────────────────

# General API: 20 req/s per external IP (reads, search, health)
limit_req_zone $rate_limit_key zone=kcp_general:10m rate=20r/s;

# Sync: 5 req/s per external IP (push/pull between peers)
limit_req_zone $rate_limit_key zone=kcp_sync:10m rate=5r/s;

# Write: 10 req/s per external IP (publish artifacts)
limit_req_zone $rate_limit_key zone=kcp_write:10m rate=10r/s;

# Portal: 10 req/min per external IP (admin portal — stricter for outsiders)
limit_req_zone $rate_limit_key zone=portal_req:10m rate=10r/m;

# Log when rate limit is hit
limit_req_log_level warn;
