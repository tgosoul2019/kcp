# ──────────────────────────────────────────────────────────────────────────────
# KCP Peers — nginx virtual hosts
# Cada peer tem seu próprio server block e aponta para uma instância uvicorn
# separada com dados isolados.
#
# peer01 → porta 8801 → /dados/kcp/data/peer01/
# peer02 → porta 8802 → /dados/kcp/data/peer02/
# peer03 → porta 8803 → /dados/kcp/data/peer03/
# peer04 → porta 8804 → /dados/kcp/data/peer04/
# peer05 → porta 8805 → /dados/kcp/data/peer05/
# peer06 → porta 8806 → /dados/kcp/data/peer06/
# peer07 → porta 8807 → /dados/kcp/data/peer07/
#
# Deploy inicial (primeira vez):
#   sudo cp infra/nginx-kcp-peers.conf /etc/nginx/sites-available/kcp-peers
#   sudo ln -sf /etc/nginx/sites-available/kcp-peers /etc/nginx/sites-enabled/kcp-peers
#   sudo nginx -t && sudo systemctl reload nginx
#
# Renovar após adicionar novos peers:
#   sudo cp infra/nginx-kcp-peers.conf /etc/nginx/sites-available/kcp-peers
#   sudo nginx -t && sudo systemctl reload nginx
# ──────────────────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS redirect (todos os peers) ────────────────────────────────────
server {
    listen 80;
    server_name
        peer01.kcp-protocol.org
        peer02.kcp-protocol.org
        peer03.kcp-protocol.org
        peer04.kcp-protocol.org
        peer05.kcp-protocol.org
        peer06.kcp-protocol.org
        peer07.kcp-protocol.org;
    return 301 https://$host$request_uri;
}

# ══════════════════════════════════════════════════════════════════════════════
# peer01.kcp-protocol.org → uvicorn :8801
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    server_name peer01.kcp-protocol.org;

    ssl_certificate     /etc/letsencrypt/live/peer01.kcp-protocol.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/peer01.kcp-protocol.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-KCP-Node "peer01.kcp-protocol.org";

    access_log /var/log/nginx/kcp-peer01.access.log;
    error_log  /var/log/nginx/kcp-peer01.error.log;

    set $upstream "127.0.0.1:8801";
    include /etc/nginx/kcp-locations.conf;
}

